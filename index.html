<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f4faf6">
<title>マイログ</title>
<meta name="description" content="テニスから読書まで、あらゆる活動・目標を管理できるライフログアプリ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#22a55e;--primary-dark:#178a4c;--primary-light:#e6f9ef;--primary-mid:#d0f0e0;
  --text:#152b1e;--text2:#3d6b52;--text3:#8db09a;
  --bg:#f2fbf6;--card:#ffffff;--card-border:#c8e8d4;
  --danger:#e04040;--amber:#d97706;--amber-bg:#fff8e6;--amber-border:#fde68a;
  --shadow:0 1px 8px rgba(34,165,94,0.09);--shadow-md:0 3px 16px rgba(34,165,94,0.13);--shadow-lg:0 6px 24px rgba(34,165,94,0.16);
}
html,body{height:100%;overflow:hidden;background:#c8e8d4}
body{font-family:'DM Sans',sans-serif;display:flex;justify-content:center;align-items:center}
.app-wrap{width:100%;max-width:430px;height:100%;height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}

/* ── Navigation ── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,0.98);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1.5px solid var(--card-border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:8px;box-shadow:0 -2px 16px rgba(34,165,94,0.08)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:none;border:none;cursor:pointer;color:var(--text3);transition:color 0.2s;-webkit-appearance:none}
.nav-btn.active{color:var(--primary)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-label{font-size:10px;font-weight:600}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);opacity:0;margin-top:2px}
.nav-btn.active .nav-dot{opacity:1}
.tab{display:none}.tab.active{display:block}

/* ── FAB ── */
.fab{position:absolute;bottom:calc(76px + env(safe-area-inset-bottom));right:16px;z-index:100}
.fab-ball{width:60px;height:60px;border-radius:50%;background:linear-gradient(145deg,#c8f050,#a8d018);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(168,208,24,0.5),0 1px 4px rgba(0,0,0,0.1),inset 0 2px 4px rgba(255,255,255,0.6);transition:transform 0.2s,box-shadow 0.15s;-webkit-appearance:none}
.fab-ball:active{transform:scale(0.93);box-shadow:0 2px 8px rgba(168,208,24,0.4)}
.fab-ball svg{width:24px;height:24px;stroke:#2a5000;fill:none;stroke-width:2.5;stroke-linecap:round;transition:transform 0.25s}
.fab-ball.open svg{transform:rotate(45deg)}
.fab-menu{position:absolute;bottom:68px;right:0;display:flex;flex-direction:column;gap:8px;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.2s;transform:translateY(10px)}
.fab-menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
.fab-item{display:flex;align-items:center;gap:10px;background:white;border:1.5px solid var(--card-border);border-radius:20px;padding:11px 18px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow-md);-webkit-appearance:none;border:none;font-family:'DM Sans',sans-serif}
.fab-item svg{width:16px;height:16px;stroke:var(--primary);fill:none;stroke-width:2;stroke-linecap:round}
.fab-item:active{background:var(--primary-light)}

/* ── Filter bars ── */
.filter-area{padding:max(14px,calc(env(safe-area-inset-top)+10px)) 16px 0;background:linear-gradient(180deg,var(--primary-mid) 0%,var(--primary-light) 60%,transparent 100%)}
.filter-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch}
.filter-scroll::-webkit-scrollbar{display:none}
.proj-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:22px;border:1.5px solid var(--card-border);background:white;cursor:pointer;transition:all 0.2s;-webkit-appearance:none;font-family:'DM Sans',sans-serif;box-shadow:var(--shadow);font-size:13px;font-weight:600;color:var(--text2)}
.proj-chip.active{color:white;font-weight:700;box-shadow:var(--shadow-md)}
.member-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:22px;border:1.5px solid var(--card-border);background:white;cursor:pointer;transition:all 0.2s;-webkit-appearance:none;font-family:'DM Sans',sans-serif;box-shadow:var(--shadow)}
.member-chip.active{border-color:var(--primary);background:var(--primary);box-shadow:var(--shadow-md)}
.member-chip span:last-child{font-size:13px;font-weight:500;color:var(--text2)}
.member-chip.active span:last-child{color:white;font-weight:700}

/* ── Stats strip ── */
.stats-strip{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stats-strip::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;background:white;border:1.5px solid var(--card-border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;box-shadow:var(--shadow)}
.stat-chip b{color:var(--primary)}

/* ── Goal summary card ── */
.goal-summary-card{margin:12px 16px 0;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);border-radius:20px;padding:16px 18px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:var(--shadow-lg)}
.goal-summary-card:active{transform:scale(0.98)}
.goal-summary-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.goal-summary-ttl{font-size:14px;font-weight:700;color:white;display:flex;align-items:center;gap:6px}
.goal-summary-ttl svg{width:14px;height:14px;stroke:#c8f050;fill:none;stroke-width:2.5}
.goal-summary-hint{font-size:11px;color:rgba(255,255,255,0.65)}
.goal-chips-wrap{display:flex;flex-wrap:wrap;gap:6px}
.g-chip{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.28);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;color:white;display:flex;align-items:center;gap:4px}
.g-chip-sub{font-size:10px;color:rgba(255,255,255,0.7)}
.goal-empty-hint{font-size:12px;color:rgba(255,255,255,0.65);text-align:center;padding:6px 0}

/* ── Project home cards ── */
.proj-home-card{background:white;border:1.5px solid var(--card-border);border-radius:16px;padding:14px 14px 14px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden}
.proj-home-card:active{transform:scale(0.99);box-shadow:none}
.proj-home-accent{position:absolute;left:0;top:0;bottom:0;width:5px}
.proj-home-emoji{font-size:26px}
.proj-home-info{flex:1}
.proj-home-name{font-size:15px;font-weight:700;color:var(--text)}
.proj-home-stats{font-size:12px;color:var(--text3);margin-top:3px}
.proj-home-arrow{color:var(--text3);font-size:20px;font-weight:300}

/* ── Calendar ── */
.cal-wrap{margin:12px 16px 6px;background:white;border:1.5px solid var(--card-border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.cal-month{font-size:16px;font-weight:700;color:var(--text)}
.cal-nav{background:var(--bg);border:1.5px solid var(--card-border);cursor:pointer;color:var(--text2);padding:6px 8px;border-radius:10px;display:flex;align-items:center;-webkit-appearance:none;transition:background 0.15s}
.cal-nav:active{background:var(--primary-light)}
.cal-nav svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.cal-wds{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px;margin-bottom:2px}
.cal-wd{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:4px 0}
.cal-wd:first-child{color:#e04040}.cal-wd:last-child{color:#3a7ad4}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 12px;gap:3px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;transition:background 0.15s}
.cal-day:active{background:var(--primary-light)}
.cal-day.empty{pointer-events:none}
.cal-day-num{font-size:13px;font-weight:500;color:var(--text2);line-height:1}
.cal-day.sunday .cal-day-num{color:#e04040}
.cal-day.saturday .cal-day-num{color:#3a7ad4}
.cal-day.today{background:var(--primary-light);border:2px solid var(--primary)}
.cal-day.today .cal-day-num{color:var(--primary);font-weight:800}
.cal-day.selected{background:var(--primary);border:2px solid var(--primary-dark)}
.cal-day.selected .cal-day-num{color:white;font-weight:800}
.cal-dots{display:flex;gap:2px;justify-content:center;margin-top:3px;min-height:5px;max-width:22px;flex-wrap:wrap}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── Day panel ── */
.day-panel{margin:0 16px 12px;border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.day-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--primary-light);border:1.5px solid var(--card-border);border-radius:16px 16px 0 0}
.day-panel-date{font-size:13px;font-weight:700;color:var(--primary-dark)}
.day-panel-close{background:white;border:1.5px solid var(--card-border);border-radius:8px;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:2px 7px;-webkit-appearance:none}
.day-panel-body{background:white;border:1.5px solid var(--card-border);border-top:none;border-radius:0 0 16px 16px;padding:10px 12px}

/* ── Sections ── */
.section{padding:10px 16px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px}

/* ── Activity cards ── */
.log-card{background:white;border:1.5px solid var(--card-border);border-radius:16px;padding:14px 14px 14px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow 0.2s,transform 0.15s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.log-card-accent{position:absolute;left:0;top:0;bottom:0;width:4px}
.log-card:active{box-shadow:none;transform:scale(0.99)}
.log-card-sm{background:var(--bg);border:1.5px solid var(--card-border);border-radius:12px;padding:10px 12px 10px 14px;margin-bottom:8px;cursor:pointer;transition:background 0.15s;position:relative;overflow:hidden}
.log-card-sm:last-child{margin-bottom:0}
.log-card-sm:active{background:var(--primary-light)}
.log-card-sm-accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.log-card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.log-card-title{font-size:15px;font-weight:600;color:var(--text);flex:1;margin-right:8px}
.log-card-title-sm{font-size:13px;font-weight:600;color:var(--text);flex:1;margin-right:6px}
.log-card-date{font-size:11px;color:var(--text3);white-space:nowrap;font-weight:500}
.log-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{border-radius:8px;padding:3px 9px;font-size:11px;font-weight:700}
.tag-sm{border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700}
.log-card-memo{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}
.carry-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);border-radius:6px;padding:2px 7px;margin-top:6px;font-weight:700}
.badge-sm{display:inline-flex;align-items:center;gap:3px;font-size:10px;border-radius:6px;padding:2px 8px;font-weight:700}
.equip-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);border-radius:6px;padding:2px 7px}

/* ── Goal list ── */
.goal-list-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:white;border:1.5px solid var(--card-border);border-radius:12px;margin-bottom:8px}
.goal-list-item.done-item{opacity:0.6}
.goal-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--card-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;margin-top:1px}
.goal-circle.done{background:var(--primary);border-color:var(--primary-dark)}
.goal-circle svg{width:12px;height:12px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0}
.goal-circle.done svg{opacity:1}
.goal-list-body{flex:1}
.goal-list-cat{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
.goal-list-text{font-size:13px;color:var(--text2);line-height:1.5;font-weight:500}
.goal-list-item.done-item .goal-list-text{text-decoration:line-through}
.goal-list-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;flex-shrink:0;-webkit-appearance:none}
.goal-list-del svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.goal-list-del:active{color:var(--danger)}

/* ── Empty states ── */
.empty-state{text-align:center;padding:40px 20px}
.empty-state svg{width:44px;height:44px;stroke:var(--card-border);fill:none;margin:0 auto 14px;display:block}
.empty-state p{font-size:14px;line-height:1.7;color:var(--text3)}
.day-empty{text-align:center;padding:16px;font-size:13px;color:var(--text3)}

/* ── Log sub-tabs ── */
.log-tabs{display:flex;padding:12px 16px 0;border-bottom:2px solid var(--card-border)}
.log-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.log-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.log-filter-bar{padding:10px 16px 0;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.log-filter-bar::-webkit-scrollbar{display:none}
.log-list{padding:12px 16px}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,50,20,0.3);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:white;border-radius:28px 28px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);-webkit-overflow-scrolling:touch;box-shadow:0 -4px 30px rgba(0,0,0,0.1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--card-border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:20px}

/* ── Forms ── */
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:7px;display:block}
.form-input,.form-textarea{width:100%;background:var(--bg);border:1.5px solid var(--card-border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none;appearance:none}
.form-input:focus,.form-textarea:focus{border-color:var(--primary);background:white;box-shadow:0 0 0 3px var(--primary-light)}
.form-textarea{resize:none;min-height:90px;line-height:1.6}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text3)}
.tag-sugs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-sug{background:white;border:1.5px solid var(--card-border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;box-shadow:var(--shadow)}
.tag-sug.sel{background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark);font-weight:700}
.check-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 0;margin-bottom:14px}
.check-box{width:24px;height:24px;border-radius:8px;border:2px solid var(--card-border);background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.check-box.checked{background:var(--primary);border-color:var(--primary-dark);box-shadow:0 2px 6px rgba(34,165,94,0.35)}
.check-box svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.check-label{font-size:13px;color:var(--text2);font-weight:500}
.carry-section{background:var(--amber-bg);border:1.5px solid var(--amber-border);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--amber);margin-bottom:14px;line-height:1.5;font-weight:500}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 3px 12px rgba(34,165,94,0.38)}
.btn-secondary{background:var(--bg);border:2px solid var(--card-border);color:var(--text2)}
.btn:active{transform:scale(0.97)}
.yt-chip{display:inline-flex;align-items:center;gap:6px;background:#fff5f5;border:1.5px solid #fca5a5;border-radius:10px;padding:6px 10px;font-size:12px;color:#dc4040;margin:4px 4px 0 0;font-weight:500}

/* ── Selectors (form project/member) ── */
.sel-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.sel-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:22px;border:1.5px solid var(--card-border);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;-webkit-appearance:none;font-family:'DM Sans',sans-serif;font-weight:500}
.sel-btn.active{color:white;font-weight:700;box-shadow:0 2px 8px rgba(34,165,94,0.25)}

/* ── Project modal UI ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.emoji-btn{font-size:22px;padding:6px;border-radius:8px;cursor:pointer;border:2px solid transparent;background:var(--bg);transition:all 0.15s;-webkit-appearance:none;line-height:1}
.emoji-btn.sel{border-color:var(--primary);background:var(--primary-light)}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.color-swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;-webkit-appearance:none}
.color-swatch.sel{border-color:white;box-shadow:0 0 0 3px rgba(0,0,0,0.25)}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:4px}
.toggle-label{font-size:14px;color:var(--text2);font-weight:500}
.toggle-ui{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle-ui input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--card-border);border-radius:13px;transition:background 0.2s;cursor:pointer}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:white;border-radius:50%;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.toggle-ui input:checked+.toggle-slider{background:var(--primary)}
.toggle-ui input:checked+.toggle-slider::before{transform:translateX(18px)}

/* ── Goal detail sheet ── */
.sheet-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,50,20,0.3);opacity:0;pointer-events:none;transition:opacity 0.25s;display:flex;align-items:flex-end}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{background:white;border-radius:28px 28px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-height:82dvh;overflow-y:auto;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);-webkit-overflow-scrolling:touch;box-shadow:0 -4px 30px rgba(0,0,0,0.1)}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--card-border);border-radius:2px;margin:0 auto 16px}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sheet-title{font-size:18px;font-weight:700;color:var(--text)}
.sheet-close{background:var(--bg);border:1.5px solid var(--card-border);border-radius:10px;padding:7px 12px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:600;-webkit-appearance:none}
.sheet-section{margin-bottom:20px}
.sheet-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

/* ── Detail overlays ── */
.detail-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform 0.32s cubic-bezier(0.32,0.72,0,1)}
.detail-overlay.open{transform:translateX(0)}
.detail-hd{padding:max(16px,calc(env(safe-area-inset-top)+12px)) 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--card-border);position:sticky;top:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);z-index:10}
.back-btn{background:var(--bg);border:1.5px solid var(--card-border);border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;color:var(--text2);-webkit-appearance:none;transition:background 0.15s}
.back-btn:active{background:var(--primary-light)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.detail-title-wrap{flex:1}
.detail-title{font-size:17px;font-weight:700;color:var(--text)}
.detail-date{font-size:12px;color:var(--text3);margin-top:2px;font-weight:500}
.detail-body{padding:16px}
.detail-sec{margin-bottom:22px}
.detail-sec-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px}
.detail-text{font-size:14px;color:var(--text2);line-height:1.7}

/* ── Settings ── */
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1.5px solid var(--card-border);cursor:pointer}
.settings-row-label{font-size:14px;color:var(--text);font-weight:500}
.settings-row-value{font-size:13px;color:var(--text3)}
.settings-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin:22px 0 10px}
.mn-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1.5px solid var(--card-border)}
.mn-emoji{font-size:20px;width:32px;text-align:center}
.mn-input{flex:1;background:var(--bg);border:1.5px solid var(--card-border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;font-weight:500}
.mn-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.proj-settings-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:12px;margin-bottom:8px;border:1.5px solid var(--card-border)}
.proj-settings-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.proj-action-btn{background:white;border:1.5px solid var(--card-border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);-webkit-appearance:none;font-family:'DM Sans',sans-serif}
.proj-action-btn:active{background:var(--primary-light)}
.proj-action-btn.del{color:var(--danger)}
.proj-action-btn.del:active{background:#fef2f2}

/* ── Toast ── */
#toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);border-radius:22px;padding:10px 20px;font-size:13px;color:white;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90%;font-weight:600;box-shadow:var(--shadow-md)}

.page-title-area{padding:max(16px,calc(env(safe-area-inset-top)+12px)) 16px 10px}
.page-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:2px}
.page-sub{font-size:13px;color:var(--text3);font-weight:500}
input[type=date]{color-scheme:light}
</style>
</head>
<body>
<div class="app-wrap" id="app">
<div class="screen" id="screen">

<!-- ========== HOME TAB ========== -->
<div class="tab active" id="tab-home">
  <div class="filter-area">
    <div class="filter-scroll" id="home-proj-filter"></div>
    <div class="filter-scroll" id="home-member-filter"></div>
  </div>
  <div id="home-stats-area"></div>
  <div id="home-goal-summary"></div>
  <div class="cal-wrap">
    <div class="cal-hd">
      <button class="cal-nav" onclick="calPrev()"><svg viewBox="0 0 24 24"><polyline points="15,18,9,12,15,6"/></svg></button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="cal-nav" onclick="calNext()"><svg viewBox="0 0 24 24"><polyline points="9,18,15,12,9,6"/></svg></button>
    </div>
    <div class="cal-wds">
      <div class="cal-wd">日</div><div class="cal-wd">月</div><div class="cal-wd">火</div>
      <div class="cal-wd">水</div><div class="cal-wd">木</div><div class="cal-wd">金</div><div class="cal-wd">土</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div id="day-panel" style="display:none">
    <div class="day-panel-hd">
      <div class="day-panel-date" id="day-panel-date"></div>
      <button class="day-panel-close" onclick="closeDayPanel()">×</button>
    </div>
    <div class="day-panel-body" id="day-panel-body"></div>
  </div>
  <div class="section">
    <div class="section-title">最近の記録</div>
    <div id="home-recent"></div>
  </div>
</div>

<!-- ========== LOG TAB ========== -->
<div class="tab" id="tab-log">
  <div class="page-title-area">
    <div class="page-title">ログ</div>
    <div class="page-sub">活動と目標の記録</div>
  </div>
  <div class="log-tabs">
    <div class="log-tab active" id="log-tab-activity" onclick="switchLogSub('activity')">活動記録</div>
    <div class="log-tab" id="log-tab-goal" onclick="switchLogSub('goal')">目標</div>
  </div>
  <div class="log-filter-bar" id="log-proj-filter"></div>
  <div class="log-filter-bar" id="log-member-filter"></div>
  <div class="log-list" id="log-activity-list"></div>
  <div class="log-list" id="log-goal-list" style="display:none"></div>
</div>

<!-- ========== SETTINGS TAB ========== -->
<div class="tab" id="tab-settings">
  <div class="page-title-area">
    <div class="page-title">設定</div>
  </div>
  <div style="padding:0 16px">
    <div class="settings-section-title">プロジェクト管理</div>
    <div id="settings-projects"></div>
    <button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="openModal('project')">＋ プロジェクトを追加</button>

    <div class="settings-section-title">メンバー名の設定</div>
    <div id="settings-members"></div>
    <button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="saveMemberNames()">名前を保存</button>

    <div class="settings-section-title">データ管理</div>
    <div class="settings-row" onclick="exportData()">
      <span class="settings-row-label">データをエクスポート</span>
      <span class="settings-row-value">JSON ›</span>
    </div>
    <div class="settings-row" onclick="importData()">
      <span class="settings-row-label">データをインポート</span>
      <span class="settings-row-value">JSON ›</span>
    </div>
    <div class="settings-row" onclick="importOldTennis()">
      <span class="settings-row-label">旧テニスアプリから引き継ぐ</span>
      <span class="settings-row-value">変換 ›</span>
    </div>
    <div style="margin-top:32px;text-align:center;padding-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:var(--primary)">マイログ v1.0</div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">データはこの端末のみに保存されます</div>
    </div>
  </div>
</div>
</div><!-- /screen -->

<!-- ========== FAB ========== -->
<div class="fab">
  <div class="fab-menu" id="fab-menu">
    <button class="fab-item" onclick="openModal('project')">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      プロジェクト追加
    </button>
    <button class="fab-item" onclick="openModal('goal')">
      <svg viewBox="0 0 24 24"><polygon points="12,2,15.09,8.26,22,9.27,17,14.14,18.18,21.02,12,17.77,5.82,21.02,7,14.14,2,9.27,8.91,8.26"/></svg>
      目標を追加
    </button>
    <button class="fab-item" id="fab-equip-item" onclick="openModal('equipment')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07,4.93a10,10,0,1,0,0,14.14"/></svg>
      装備記録
    </button>
    <button class="fab-item" onclick="openModal('activity')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16"/><polyline points="14,2,14,8,20,8"/><path d="M20 2v16a2 2 0 0 1-2 2H8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      活動記録
    </button>
  </div>
  <button class="fab-ball" id="fab-ball" onclick="toggleFab()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- ========== ACTIVITY MODAL ========== -->
<div class="modal-overlay" id="modal-activity">
<div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="modal-activity-title">活動記録を追加</div>
  <div class="form-group">
    <label class="form-label">プロジェクト *</label>
    <div class="sel-wrap" id="a-proj-sel"></div>
  </div>
  <div class="form-group">
    <label class="form-label">メンバー *</label>
    <div class="sel-wrap" id="a-member-sel"></div>
  </div>
  <div class="form-group">
    <label class="form-label">日付</label>
    <input class="form-input" type="date" id="a-date">
  </div>
  <div class="form-group">
    <label class="form-label">タイトル *</label>
    <input class="form-input" type="text" id="a-title" placeholder="例：フォアハンド集中練習">
  </div>
  <div class="form-group">
    <label class="form-label">タグ（コンマ区切り）</label>
    <input class="form-input" type="text" id="a-tags" placeholder="例：サーブ,フォア" oninput="renderActTagSugs()">
    <div class="tag-sugs" id="a-tag-sugs"></div>
  </div>
  <div class="form-group">
    <label class="form-label">振り返り・メモ</label>
    <textarea class="form-textarea" id="a-memo" placeholder="今日の気づき、課題、良かった点など..."></textarea>
  </div>
  <div id="a-carry-section" style="display:none">
    <label class="form-label">前回の継続課題</label>
    <div class="carry-section" id="a-carry-text"></div>
  </div>
  <div class="form-group">
    <label class="form-label">YouTube リンク</label>
    <div style="display:flex;gap:8px">
      <input class="form-input" type="url" id="a-yt" placeholder="https://youtube.com/watch?v=..." style="flex:1">
      <button class="btn btn-secondary" style="flex:none;padding:12px 14px;font-size:13px" onclick="addYt()">追加</button>
    </div>
    <div id="a-yt-list" style="margin-top:8px"></div>
  </div>
  <div class="check-row" onclick="toggleCarry()">
    <div class="check-box" id="a-carry-check"><svg viewBox="0 0 14 14"><polyline points="2,7,5.5,10.5,12,3"/></svg></div>
    <div class="check-label">この課題を次回に持ち越す</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="closeModal('activity')">キャンセル</button>
    <button class="btn btn-primary" id="modal-activity-btn" onclick="saveActivity()">保存する</button>
  </div>
</div>
</div>

<!-- ========== EQUIPMENT MODAL ========== -->
<div class="modal-overlay" id="modal-equipment">
<div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="modal-equipment-title">装備記録を追加</div>
  <div class="form-group">
    <label class="form-label">プロジェクト *</label>
    <div class="sel-wrap" id="e-proj-sel"></div>
  </div>
  <div class="form-group">
    <label class="form-label">メンバー *</label>
    <div class="sel-wrap" id="e-member-sel"></div>
  </div>
  <div class="form-group">
    <label class="form-label">日付</label>
    <input class="form-input" type="date" id="e-date">
  </div>
  <div class="form-group">
    <label class="form-label">品名 *</label>
    <input class="form-input" type="text" id="e-item" placeholder="例：ポリツアープロ 125">
    <div class="tag-sugs" id="e-item-sugs"></div>
  </div>
  <div class="form-group">
    <label class="form-label">関連機材・道具</label>
    <input class="form-input" type="text" id="e-sub" placeholder="例：Yonex Vcore 98">
    <div class="tag-sugs" id="e-sub-sugs"></div>
  </div>
  <div style="display:flex;gap:10px" class="form-group">
    <div style="flex:2">
      <label class="form-label">数値</label>
      <input class="form-input" type="number" id="e-val" placeholder="例：50" min="0">
    </div>
    <div style="flex:1">
      <label class="form-label">単位</label>
      <input class="form-input" type="text" id="e-unit" placeholder="lbs">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">メモ</label>
    <textarea class="form-textarea" id="e-memo" placeholder="使用感、特記事項など..." style="min-height:70px"></textarea>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="closeModal('equipment')">キャンセル</button>
    <button class="btn btn-primary" id="modal-equipment-btn" onclick="saveEquipment()">保存する</button>
  </div>
</div>
</div>

<!-- ========== GOAL MODAL ========== -->
<div class="modal-overlay" id="modal-goal">
<div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="modal-goal-title">目標を追加</div>
  <div class="form-group">
    <label class="form-label">プロジェクト *</label>
    <div class="sel-wrap" id="g-proj-sel"></div>
  </div>
  <div class="form-group">
    <label class="form-label">メンバー *</label>
    <div class="sel-wrap" id="g-member-sel"></div>
  </div>
  <div class="form-group">
    <label class="form-label">カテゴリ *</label>
    <input class="form-input" type="text" id="g-cat" placeholder="例：技術、体力、メンタル">
  </div>
  <div class="form-group">
    <label class="form-label">目標内容 *</label>
    <textarea class="form-textarea" id="g-text" placeholder="具体的な目標を入力..." style="min-height:80px"></textarea>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="closeModal('goal')">キャンセル</button>
    <button class="btn btn-primary" id="modal-goal-btn" onclick="saveGoal()">追加する</button>
  </div>
</div>
</div>

<!-- ========== PROJECT MODAL ========== -->
<div class="modal-overlay" id="modal-project">
<div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="modal-project-title">プロジェクトを追加</div>
  <div class="form-group">
    <label class="form-label">プロジェクト名 *</label>
    <input class="form-input" type="text" id="proj-name" placeholder="例：読書、筋トレ、料理">
  </div>
  <div class="form-group">
    <label class="form-label">絵文字アイコン</label>
    <div class="emoji-grid" id="proj-emoji-grid"></div>
  </div>
  <div class="form-group">
    <label class="form-label">テーマカラー</label>
    <div class="color-swatches" id="proj-colors"></div>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label">装備・道具の記録を使う</span>
    <label class="toggle-ui">
      <input type="checkbox" id="proj-equip">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="closeModal('project')">キャンセル</button>
    <button class="btn btn-primary" id="modal-project-btn" onclick="saveProject()">追加する</button>
  </div>
</div>
</div>

<!-- ========== GOAL DETAIL SHEET ========== -->
<div class="sheet-overlay" id="goal-sheet" onclick="closeGoalSheet(event)">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hd">
    <div class="sheet-title">🎯 目標</div>
    <button class="sheet-close" onclick="closeGoalSheet()">閉じる</button>
  </div>
  <div id="goal-sheet-body"></div>
</div>
</div>

<!-- ========== ACTIVITY DETAIL ========== -->
<div class="detail-overlay" id="detail-activity">
<div class="detail-hd">
  <button class="back-btn" onclick="closeDetail('activity')"><svg viewBox="0 0 24 24"><polyline points="15,18,9,12,15,6"/></svg></button>
  <div class="detail-title-wrap">
    <div class="detail-title" id="detail-a-title"></div>
    <div class="detail-date" id="detail-a-meta"></div>
  </div>
  <button class="back-btn" onclick="editDetail('activity')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
  <button class="back-btn" onclick="deleteDetail('activity')" style="color:var(--danger)"><svg viewBox="0 0 24 24"><polyline points="3,6,5,6,21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"/></svg></button>
</div>
<div class="detail-body" id="detail-a-body"></div>
</div>

<!-- ========== EQUIPMENT DETAIL ========== -->
<div class="detail-overlay" id="detail-equipment">
<div class="detail-hd">
  <button class="back-btn" onclick="closeDetail('equipment')"><svg viewBox="0 0 24 24"><polyline points="15,18,9,12,15,6"/></svg></button>
  <div class="detail-title-wrap">
    <div class="detail-title" id="detail-e-title"></div>
    <div class="detail-date" id="detail-e-meta"></div>
  </div>
  <button class="back-btn" onclick="editDetail('equipment')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
  <button class="back-btn" onclick="deleteDetail('equipment')" style="color:var(--danger)"><svg viewBox="0 0 24 24"><polyline points="3,6,5,6,21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"/></svg></button>
</div>
<div class="detail-body" id="detail-e-body"></div>
</div>

<div id="toast"></div>

<!-- ========== BOTTOM NAV ========== -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22,9,12,15,12,15,22"/></svg>
    <span class="nav-label">ホーム</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" id="nav-log" onclick="switchTab('log')">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2,14,8,20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span class="nav-label">ログ</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" id="nav-settings" onclick="switchTab('settings')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span class="nav-label">設定</span><div class="nav-dot"></div>
  </button>
</div>

<script>
// ════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════
const STORAGE_KEY = 'mylog_v1';
const OLD_KEY     = 'tennis_app_v3';

const PROJ_COLORS = ['#22a55e','#3b82f6','#8b5cf6','#f97316','#ef4444','#ec4899','#14b8a6','#d97706'];
const EMOJIS = ['🎾','⚽','🏀','🏊','🚴','🏃','📚','✏️','🎸','🎨','💪','🧘','🍳','💻','🌱','🎯','✈️','🎭','🏔️','💰','🎮','🐕','🎻','🎬','🍜','🏋️','🤸','🎪'];

const DEF_MEMBERS = [
  {id:'m1',emoji:'😊',defName:'メンバー1'},
  {id:'m2',emoji:'👦',defName:'メンバー2'},
  {id:'m3',emoji:'👧',defName:'メンバー3'},
  {id:'m4',emoji:'👩',defName:'メンバー4'},
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let db = {
  memberNames: {},
  projects: [{id:'p_tennis',name:'テニス',emoji:'🎾',color:'#22a55e',enableEquipment:true}],
  activities: [], // {id, type:'activity'|'equipment', projectId, memberId, date, title, tags, memo, carryOver, ytLinks, item, sub, val, unit}
  goals: []       // {id, projectId, memberId, cat, text, done}
};

// Filter state
let hProjF = 'all', hMembF = 'all'; // home
let lProjF = 'all', lMembF = 'all'; // log
let lSubTab = 'activity';
// Calendar
let calY = 0, calM = 0, selDate = null;
// FAB
let fabOpen = false;
// Form state
let carryChk = false, ytArr = [];
let editMode = false, editId = null;
let detailType = null, detailId = null;
let fAPrj = '', fAMbr = 'm1'; // activity form
let fEPrj = '', fEMbr = 'm1'; // equipment form
let fGPrj = '', fGMbr = 'm1'; // goal form
let fPjEmoji = '🎯', fPjColor = PROJ_COLORS[0], editProjId = null;

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function rgba(hex, a){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function today(){ const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function dayKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function fmtDate(s){ if(!s)return''; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function thisYM(){ const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}`; }
function thisY(){ return String(new Date().getFullYear()); }

// ════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }catch(e){ toast('保存容量が不足しています'); } }
function load(){
  try{ const d=localStorage.getItem(STORAGE_KEY); if(d) db=JSON.parse(d); }catch(e){}
  db.memberNames  = db.memberNames  || {};
  db.projects     = db.projects     || [{id:'p_tennis',name:'テニス',emoji:'🎾',color:'#22a55e',enableEquipment:true}];
  db.activities   = db.activities   || [];
  db.goals        = db.goals        || [];
  if(!db.projects.length) db.projects=[{id:'p_tennis',name:'テニス',emoji:'🎾',color:'#22a55e',enableEquipment:true}];
}

// ════════════════════════════════════════════
//  MEMBERS
// ════════════════════════════════════════════
function members(){ return DEF_MEMBERS.map(m=>({...m, name: db.memberNames[m.id]||m.defName})); }
function mbr(id){ return members().find(m=>m.id===id)||{name:'',emoji:'😊'}; }
function mbrName(id){ return mbr(id).name; }
function mbrEmoji(id){ return mbr(id).emoji; }

// ════════════════════════════════════════════
//  PROJECTS
// ════════════════════════════════════════════
function proj(id){ return db.projects.find(p=>p.id===id)||null; }
function projColor(id){ const p=proj(id); return p?p.color:'#22a55e'; }

function defPrj(){
  if(hProjF!=='all') return hProjF;
  return db.projects[0]?.id||'';
}

// ════════════════════════════════════════════
//  FILTER CHIP RENDERERS
// ════════════════════════════════════════════
function renderProjChips(id, cur, fn){
  const el=document.getElementById(id); if(!el)return;
  let h = `<button class="proj-chip${cur==='all'?' active':''}" style="${cur==='all'?'background:#22a55e;border-color:#22a55e;':''}" onclick="${fn}('all')">🌐 全プロジェクト</button>`;
  db.projects.forEach(p=>{
    const a=cur===p.id;
    h+=`<button class="proj-chip${a?' active':''}" style="${a?`background:${p.color};border-color:${p.color};`:`border-color:${rgba(p.color,0.4)};`}" onclick="${fn}('${p.id}')">${p.emoji} ${esc(p.name)}</button>`;
  });
  el.innerHTML=h;
}

function renderMembChips(id, cur, fn){
  const el=document.getElementById(id); if(!el)return;
  let h=`<div class="member-chip${cur==='all'?' active':''}" onclick="${fn}('all')"><span>🌐</span><span>全員</span></div>`;
  members().forEach(m=>{
    h+=`<div class="member-chip${cur===m.id?' active':''}" onclick="${fn}('${m.id}')"><span>${m.emoji}</span><span>${esc(m.name)}</span></div>`;
  });
  el.innerHTML=h;
}

function setHProjF(id){ hProjF=id; renderProjChips('home-proj-filter',hProjF,'setHProjF'); renderMembChips('home-member-filter',hMembF,'setHMembF'); renderHome(); renderCalendar(); renderGoalSummary(); updateFabEquip(); }
function setHMembF(id){ hMembF=id; renderMembChips('home-member-filter',hMembF,'setHMembF'); renderHome(); renderCalendar(); renderGoalSummary(); }
function setLProjF(id){ lProjF=id; renderProjChips('log-proj-filter',lProjF,'setLProjF'); renderLog(); }
function setLMembF(id){ lMembF=id; renderMembChips('log-member-filter',lMembF,'setLMembF'); renderLog(); }

function initFilters(){
  renderProjChips('home-proj-filter',hProjF,'setHProjF');
  renderMembChips('home-member-filter',hMembF,'setHMembF');
  renderProjChips('log-proj-filter',lProjF,'setLProjF');
  renderMembChips('log-member-filter',lMembF,'setLMembF');
}

// ════════════════════════════════════════════
//  TAB SWITCHING
// ════════════════════════════════════════════
function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('nav-'+t).classList.add('active');
  if(t==='home'){ renderHome(); renderCalendar(); renderGoalSummary(); }
  if(t==='log'){ renderProjChips('log-proj-filter',lProjF,'setLProjF'); renderMembChips('log-member-filter',lMembF,'setLMembF'); renderLog(); }
  if(t==='settings'){ renderSettingsMembers(); renderSettingsProjects(); }
  closeFab();
}

function renderAll(){
  initFilters();
  renderStatsArea();
  renderGoalSummary();
  renderRecentActivities();
  renderCalendar();
  renderLog();
  updateFabEquip();
}

// ════════════════════════════════════════════
//  FAB
// ════════════════════════════════════════════
function toggleFab(){
  fabOpen=!fabOpen;
  document.getElementById('fab-menu').classList.toggle('open',fabOpen);
  document.getElementById('fab-ball').classList.toggle('open',fabOpen);
}
function closeFab(){
  fabOpen=false;
  document.getElementById('fab-menu').classList.remove('open');
  document.getElementById('fab-ball').classList.remove('open');
}
function updateFabEquip(){
  const el=document.getElementById('fab-equip-item'); if(!el)return;
  const show = hProjF==='all'
    ? db.projects.some(p=>p.enableEquipment)
    : (proj(hProjF)||{}).enableEquipment||false;
  el.style.display = show?'':'none';
}

// ════════════════════════════════════════════
//  CALENDAR
// ════════════════════════════════════════════
function initCal(){ const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); }
function calPrev(){ calM--; if(calM<0){calM=11;calY--;} renderCalendar(); }
function calNext(){ calM++; if(calM>11){calM=0;calY++;} renderCalendar(); }

function renderCalendar(){
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month-label').textContent=`${calY}年 ${months[calM]}`;
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const tk=dayKey(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());

  // Build dot map per day
  const dotMap={};
  db.activities.filter(a=>{
    if(hProjF!=='all'&&a.projectId!==hProjF)return false;
    if(hMembF!=='all'&&a.memberId!==hMembF)return false;
    return a.date;
  }).forEach(a=>{
    if(!dotMap[a.date])dotMap[a.date]=new Set();
    dotMap[a.date].add(projColor(a.projectId));
  });

  let h='';
  for(let i=0;i<fd;i++) h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=dim;d++){
    const k=dayKey(calY,calM,d);
    const dow=(fd+d-1)%7;
    let cls='cal-day';
    if(dow===0)cls+=' sunday'; if(dow===6)cls+=' saturday';
    if(k===tk)cls+=' today'; if(k===selDate)cls+=' selected';
    const dots=[...(dotMap[k]||[])].slice(0,4).map(c=>`<div class="cal-dot" style="background:${c}"></div>`).join('');
    h+=`<div class="${cls}" onclick="selectDay('${k}')"><div class="cal-day-num">${d}</div><div class="cal-dots">${dots}</div></div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}

function selectDay(k){
  if(selDate===k){ selDate=null; closeDayPanel(); renderCalendar(); return; }
  selDate=k; renderCalendar(); showDayPanel(k);
  setTimeout(()=>{ const el=document.getElementById('day-panel'); el&&el.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
}

function showDayPanel(k){
  const acts=db.activities.filter(a=>{
    if(a.date!==k)return false;
    if(hProjF!=='all'&&a.projectId!==hProjF)return false;
    if(hMembF!=='all'&&a.memberId!==hMembF)return false;
    return true;
  });
  const d=new Date(k+'T00:00:00');
  document.getElementById('day-panel-date').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  let h='';
  if(!acts.length){ h='<div class="day-empty">この日の記録はありません</div>'; }
  else{
    acts.forEach(a=>{
      const p=proj(a.projectId), c=p?p.color:'#22a55e';
      const isE=a.type==='equipment';
      const tags=(a.tags||[]).slice(0,3).map(t=>`<span class="tag-sm" style="background:${rgba(c,0.15)};color:${c}">${esc(t)}</span>`).join('');
      h+=`<div class="log-card-sm" onclick="openDetail('${isE?'equipment':'activity'}',${a.id})">
        <div class="log-card-sm-accent" style="background:${c}"></div>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span>${mbrEmoji(a.memberId)}</span>
          ${p?`<span class="badge-sm" style="background:${rgba(c,0.15)};color:${c}">${p.emoji} ${esc(p.name)}</span>`:''}
          ${isE?`<span class="equip-badge">⚙ 装備</span>`:''}
          <span class="log-card-title-sm">${esc(a.title||a.item||'')}</span>
          ${a.carryOver?'<span style="color:var(--amber);font-size:11px">⚑</span>':''}
        </div>
        ${tags?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">${tags}</div>`:''}
      </div>`;
    });
  }
  document.getElementById('day-panel-body').innerHTML=h;
  document.getElementById('day-panel').style.display='block';
}
function closeDayPanel(){ selDate=null; document.getElementById('day-panel').style.display='none'; renderCalendar(); }

// ════════════════════════════════════════════
//  HOME
// ════════════════════════════════════════════
function renderHome(){ renderStatsArea(); renderRecentActivities(); }

function renderStatsArea(){
  const el=document.getElementById('home-stats-area');
  const ym=thisYM(), yr=thisY();
  if(hProjF==='all'){
    // Project cards
    let h='<div style="padding:12px 16px 0">';
    if(!db.projects.length){ h+='<div class="day-empty">プロジェクトを追加してください</div>'; }
    else{
      db.projects.forEach(p=>{
        const acts=db.activities.filter(a=>a.projectId===p.id&&(hMembF==='all'||a.memberId===hMembF));
        const mon=acts.filter(a=>a.type!=='equipment'&&a.date&&a.date.startsWith(ym)).length;
        const gl=db.goals.filter(g=>g.projectId===p.id&&(hMembF==='all'||g.memberId===hMembF));
        h+=`<div class="proj-home-card" onclick="setHProjF('${p.id}')">
          <div class="proj-home-accent" style="background:${p.color}"></div>
          <div class="proj-home-emoji">${p.emoji}</div>
          <div class="proj-home-info">
            <div class="proj-home-name">${esc(p.name)}</div>
            <div class="proj-home-stats">今月${mon}回 · 目標${gl.filter(g=>g.done).length}/${gl.length}達成</div>
          </div>
          <div class="proj-home-arrow">›</div>
        </div>`;
      });
      // Add project button card
      h+=`<div class="proj-home-card" onclick="openModal('project')" style="border-style:dashed;background:var(--bg);box-shadow:none">
        <div class="proj-home-emoji" style="opacity:0.4">＋</div>
        <div class="proj-home-info">
          <div class="proj-home-name" style="color:var(--text3)">プロジェクトを追加</div>
        </div>
      </div>`;
    }
    el.innerHTML=h+'</div>';
  } else {
    // Stats strip for selected project
    const acts=db.activities.filter(a=>{
      if(a.type==='equipment')return false;
      if(a.projectId!==hProjF)return false;
      if(hMembF!=='all'&&a.memberId!==hMembF)return false;
      return true;
    });
    const mon=acts.filter(a=>a.date&&a.date.startsWith(ym)).length;
    const yrc=acts.filter(a=>a.date&&a.date.startsWith(yr)).length;
    const gl=db.goals.filter(g=>g.projectId===hProjF&&(hMembF==='all'||g.memberId===hMembF));
    const carries=acts.filter(a=>a.carryOver).length;
    el.innerHTML=`<div class="stats-strip">
      <div class="stat-chip">📅 今月 <b>${mon}回</b></div>
      <div class="stat-chip">📊 今年 <b>${yrc}回</b></div>
      <div class="stat-chip">🎯 目標 <b>${gl.filter(g=>g.done).length}/${gl.length}</b></div>
      ${carries?`<div class="stat-chip">⚑ 継続中 <b>${carries}件</b></div>`:''}
    </div>`;
  }
}

function renderGoalSummary(){
  const el=document.getElementById('home-goal-summary');
  const goals=db.goals.filter(g=>{
    if(hProjF!=='all'&&g.projectId!==hProjF)return false;
    if(hMembF!=='all'&&g.memberId!==hMembF)return false;
    return true;
  });
  if(!goals.length){ el.innerHTML=''; return; }
  const byP={};
  goals.forEach(g=>{ (byP[g.projectId]=byP[g.projectId]||[]).push(g); });
  let chips='';
  Object.entries(byP).forEach(([pid,gs])=>{
    const p=proj(pid);
    chips+=`<div class="g-chip">${p?p.emoji:''} ${p?esc(p.name):'?'} <span class="g-chip-sub">${gs.filter(g=>g.done).length}/${gs.length}</span></div>`;
  });
  el.innerHTML=`<div class="goal-summary-card" onclick="openGoalSheet()">
    <div class="goal-summary-hd">
      <div class="goal-summary-ttl"><svg viewBox="0 0 24 24"><polygon points="12,2,15.09,8.26,22,9.27,17,14.14,18.18,21.02,12,17.77,5.82,21.02,7,14.14,2,9.27,8.91,8.26"/></svg>目標</div>
      <div class="goal-summary-hint">タップで確認 ›</div>
    </div>
    <div class="goal-chips-wrap">${chips}</div>
  </div>`;
}

function renderRecentActivities(){
  const el=document.getElementById('home-recent');
  const acts=db.activities.filter(a=>{
    if(a.type==='equipment')return false;
    if(hProjF!=='all'&&a.projectId!==hProjF)return false;
    if(hMembF!=='all'&&a.memberId!==hMembF)return false;
    return true;
  }).sort((a,b)=>b.id-a.id).slice(0,5);
  if(!acts.length){
    el.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2,14,8,20,8"/></svg><p>まだ記録がありません<br>FABボタン（＋）から追加しましょう</p></div>`;
    return;
  }
  el.innerHTML=acts.map(actCard).join('');
}

// ════════════════════════════════════════════
//  CARD RENDERERS
// ════════════════════════════════════════════
function actCard(a){
  const p=proj(a.projectId), c=p?p.color:'#22a55e';
  const tags=(a.tags||[]).slice(0,4).map(t=>`<span class="tag" style="background:${rgba(c,0.15)};color:${c}">${esc(t)}</span>`).join('');
  const pBadge=p?`<span class="badge-sm" style="background:${rgba(c,0.15)};color:${c}">${p.emoji} ${esc(p.name)}</span>`:'';
  const mBadge=`<span class="badge-sm" style="background:var(--primary-light);color:var(--primary-dark)">${mbrEmoji(a.memberId)} ${esc(mbrName(a.memberId))}</span>`;
  return `<div class="log-card" onclick="openDetail('activity',${a.id})">
    <div class="log-card-accent" style="background:${c}"></div>
    <div class="log-card-hd"><div class="log-card-title">${esc(a.title)}</div><div class="log-card-date">${fmtDate(a.date)}</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${pBadge}${mBadge}</div>
    ${tags?`<div class="log-card-tags">${tags}</div>`:''}
    ${a.memo?`<div class="log-card-memo">${esc(a.memo).slice(0,80)}${a.memo.length>80?'…':''}</div>`:''}
    ${a.carryOver?'<div><span class="carry-badge">⚑ 次回に継続</span></div>':''}
  </div>`;
}

function equipCard(a){
  const p=proj(a.projectId), c=p?p.color:'#d97706';
  const pBadge=p?`<span class="badge-sm" style="background:${rgba(c,0.15)};color:${c}">${p.emoji} ${esc(p.name)}</span>`:'';
  const mBadge=`<span class="badge-sm" style="background:var(--primary-light);color:var(--primary-dark)">${mbrEmoji(a.memberId)} ${esc(mbrName(a.memberId))}</span>`;
  return `<div class="log-card" onclick="openDetail('equipment',${a.id})">
    <div class="log-card-accent" style="background:${c}"></div>
    <div class="log-card-hd"><div class="log-card-title">${esc(a.item||a.title||'')}</div><div class="log-card-date">${fmtDate(a.date)}</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"><span class="equip-badge">⚙ 装備</span>${pBadge}${mBadge}</div>
    ${(a.val||a.value)?`<div style="font-size:22px;font-weight:700;color:${c};margin-top:6px">${esc(a.val||a.value)} <span style="font-size:12px;font-weight:500;color:var(--text3)">${esc(a.unit||'')}</span></div>`:''}
    ${a.sub?`<div class="log-card-memo">${esc(a.sub)}</div>`:''}
  </div>`;
}

// ════════════════════════════════════════════
//  GOAL SHEET
// ════════════════════════════════════════════
function openGoalSheet(){
  renderGoalSheetBody();
  document.getElementById('goal-sheet').classList.add('open');
}
function closeGoalSheet(e){
  if(e&&e.target!==document.getElementById('goal-sheet'))return;
  document.getElementById('goal-sheet').classList.remove('open');
}
function renderGoalSheetBody(){
  const goals=db.goals.filter(g=>{
    if(hProjF!=='all'&&g.projectId!==hProjF)return false;
    if(hMembF!=='all'&&g.memberId!==hMembF)return false;
    return true;
  });
  let h='';
  if(!goals.length){ h='<div class="day-empty">目標がありません</div>'; }
  else{
    const byP={};
    goals.forEach(g=>{ (byP[g.projectId]=byP[g.projectId]||[]).push(g); });
    Object.entries(byP).forEach(([pid,gs])=>{
      const p=proj(pid);
      h+=`<div class="sheet-section"><div class="sheet-section-title">${p?p.emoji+' '+esc(p.name):'?'}</div>`;
      const byCat={};
      gs.forEach(g=>{ (byCat[g.cat]=byCat[g.cat]||[]).push(g); });
      Object.entries(byCat).forEach(([cat,items])=>{
        h+=`<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">${esc(cat)}</div>`;
        items.forEach(g=>{
          h+=`<div class="goal-list-item${g.done?' done-item':''}">
            <div class="goal-circle${g.done?' done':''}" onclick="toggleGoalHome(${g.id})">
              <svg viewBox="0 0 14 14"><polyline points="2,7,5.5,10.5,12,3"/></svg>
            </div>
            <div class="goal-list-body">
              <div class="goal-list-text">${esc(g.text)}</div>
              <div style="font-size:10px;color:var(--text3);margin-top:4px">${mbrEmoji(g.memberId)} ${esc(mbrName(g.memberId))}</div>
            </div>
            <div style="display:flex;gap:4px">
              <button class="goal-list-del" onclick="editGoalSheet(${g.id})" style="color:var(--primary)"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
              <button class="goal-list-del" onclick="deleteGoalHome(${g.id})"><svg viewBox="0 0 24 24"><polyline points="3,6,5,6,21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6"/></svg></button>
            </div>
          </div>`;
        });
        h+='</div>';
      });
      h+='</div>';
    });
  }
  document.getElementById('goal-sheet-body').innerHTML=h;
}
function toggleGoalHome(id){
  const g=db.goals.find(x=>x.id===id); if(!g)return;
  g.done=!g.done; save(); renderGoalSheetBody(); renderGoalSummary(); renderStatsArea();
}
function deleteGoalHome(id){
  if(!confirm('この目標を削除しますか？'))return;
  db.goals=db.goals.filter(g=>g.id!==id); save();
  renderGoalSheetBody(); renderGoalSummary(); renderStatsArea(); toast('削除しました');
}
function editGoalSheet(id){
  const g=db.goals.find(x=>x.id===id); if(!g)return;
  document.getElementById('goal-sheet').classList.remove('open');

}

function deleteGoalLog(id){ if(!confirm('この目標を削除しますか？'))return; db.goals=db.goals.filter(g=>g.id!==id); save(); renderLogGoals(); renderGoalSummary(); renderStatsArea(); toast('削除しました'); }

function openDetail(type, id){

  const p=proj(a.projectId), c=p?p.color:'#22a55e';

  if(type==='activity'){
    document.getElementById('detail-a-title').textContent=a.title||'';
    document.getElementById('detail-a-meta').textContent=`${fmtDate(a.date)} · ${mbrEmoji(a.memberId)} ${mbrName(a.memberId)}`;
    const tags=(a.tags||[]).map(t=>`<span class="tag" style="background:${rgba(c,0.15)};color:${c}">${esc(t)}</span>`).join('');
    let b='';
    if(p) b+=`<div class="detail-sec"><div class="detail-sec-label">プロジェクト</div><span class="badge-sm" style="background:${rgba(c,0.15)};color:${c};font-size:13px;padding:4px 12px">${p.emoji} ${esc(p.name)}</span></div>`;
    if(tags) b+=`<div class="detail-sec"><div class="detail-sec-label">タグ</div><div style="display:flex;flex-wrap:wrap;gap:6px">${tags}</div></div>`;
    if(a.carryOver&&a.carryText) b+=`<div class="detail-sec"><div class="detail-sec-label">前回の継続課題</div><div class="carry-section">${esc(a.carryText)}</div></div>`;
    if(a.memo) b+=`<div class="detail-sec"><div class="detail-sec-label">振り返り・メモ</div><div class="detail-text">${esc(a.memo).replace(/\n/g,'<br>')}</div></div>`;
    if(a.carryOver) b+=`<div style="margin-top:8px"><span class="carry-badge">⚑ 次回に継続</span></div>`;
    if(a.ytLinks&&a.ytLinks.length) b+=`<div class="detail-sec"><div class="detail-sec-label">YouTube動画</div>${a.ytLinks.map(u=>`<a href="${esc(u)}" target="_blank" style="display:block;font-size:13px;color:#dc4040;word-break:break-all;margin-bottom:6px">${esc(u)}</a>`).join('')}</div>`;
    document.getElementById('detail-a-body').innerHTML=b;
    document.getElementById('detail-activity').classList.add('open');
  } else {
    document.getElementById('detail-e-title').textContent=a.item||a.title||'';
    document.getElementById('detail-e-meta').textContent=`${fmtDate(a.date)} · ${mbrEmoji(a.memberId)} ${mbrName(a.memberId)}`;
    let b='';
    if(p) b+=`<div class="detail-sec"><div class="detail-sec-label">プロジェクト</div><span class="badge-sm" style="background:${rgba(c,0.15)};color:${c};font-size:13px;padding:4px 12px">${p.emoji} ${esc(p.name)}</span></div>`;
    if(a.val||a.value) b+=`<div class="detail-sec"><div class="detail-sec-label">数値</div><div style="font-size:36px;font-weight:700;color:${c}">${esc(a.val||a.value||'')} <span style="font-size:14px;font-weight:500;color:var(--text3)">${esc(a.unit||'')}</span></div></div>`;
    if(a.sub) b+=`<div class="detail-sec"><div class="detail-sec-label">関連機材</div><div class="detail-text">${esc(a.sub)}</div></div>`;
    if(a.memo) b+=`<div class="detail-sec"><div class="detail-sec-label">メモ</div><div class="detail-text">${esc(a.memo).replace(/\n/g,'<br>')}</div></div>`;
    document.getElementById('detail-e-body').innerHTML=b;
    document.getElementById('detail-equipment').classList.add('open');
  }
}

//  TAG SUGGESTIONS
// ════════════════════════════════════════════
function renderActTagSugs(){
  const inp=document.getElementById('a-tags'), el=document.getElementById('a-tag-sugs');
  const freq={};
  db.activities.filter(a=>a.type==='activity'&&a.projectId===fAPrj).forEach(a=>{ (a.tags||[]).forEach(t=>{ freq[t]=(freq[t]||0)+1; }); });
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>x[0]);
  const typed=(inp.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const cur=typed[typed.length-1]||'';
  const show=top.filter(t=>!typed.includes(t)&&(!cur||t.toLowerCase().includes(cur.toLowerCase())));
  el.innerHTML=show.map(t=>`<div class="tag-sug" onclick="addActTag('${esc(t)}')">${esc(t)}</div>`).join('');
}
function addActTag(t){
  const inp=document.getElementById('a-tags');
  const parts=(inp.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!parts.includes(t)) parts.push(t);
  inp.value=parts.join(','); renderActTagSugs();
}

function renderEquipSugs(){
  const items={},subs={};
  db.activities.filter(a=>a.type==='equipment'&&a.projectId===fEPrj).forEach(a=>{
    if(a.item) items[a.item]=(items[a.item]||0)+1;
    if(a.sub)  subs[a.sub]=(subs[a.sub]||0)+1;
  });
  document.getElementById('e-item-sugs').innerHTML=Object.entries(items).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t])=>`<div class="tag-sug" onclick="document.getElementById('e-item').value='${esc(t)}'">${esc(t)}</div>`).join('');
  document.getElementById('e-sub-sugs').innerHTML=Object.entries(subs).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([t])=>`<div class="tag-sug" onclick="document.getElementById('e-sub').value='${esc(t)}'">${esc(t)}</div>`).join('');
}

// ════════════════════════════════════════════
//  MODAL OPEN / CLOSE
// ════════════════════════════════════════════
function openModal(type, prefill){
  closeFab();
  editMode=!!prefill&&!!editId;
  const dp=defPrj();

  if(type==='activity'){
    if(prefill){
      fAPrj=prefill.projectId||dp; fAMbr=prefill.memberId||'m1';
      document.getElementById('a-date').value=prefill.date||today();
      document.getElementById('a-title').value=prefill.title||'';
      document.getElementById('a-tags').value=(prefill.tags||[]).join(',');
      document.getElementById('a-memo').value=prefill.memo||'';
      ytArr=[...(prefill.ytLinks||[])]; carryChk=!!prefill.carryOver;
      document.getElementById('modal-activity-title').textContent='活動記録を編集';
      document.getElementById('modal-activity-btn').textContent='更新する';
    } else {
      fAPrj=dp; fAMbr='m1';
      document.getElementById('a-date').value=today();
      document.getElementById('a-title').value=''; document.getElementById('a-tags').value=''; document.getElementById('a-memo').value='';
      document.getElementById('a-yt').value=''; ytArr=[]; carryChk=false;
      document.getElementById('modal-activity-title').textContent='活動記録を追加';
      document.getElementById('modal-activity-btn').textContent='保存する';
    }
    renderProjSel('a-proj-sel',fAPrj,'setAPrj'); renderMembSel('a-member-sel',fAMbr,'setAMbr');
    document.getElementById('a-carry-check').classList.toggle('checked',carryChk);
    updateCarrySection(); renderActTagSugs(); renderYtList();

  } else if(type==='equipment'){
    if(prefill){
      fEPrj=prefill.projectId||dp; fEMbr=prefill.memberId||'m1';
      document.getElementById('e-date').value=prefill.date||today();
      document.getElementById('e-item').value=prefill.item||prefill.title||'';
      document.getElementById('e-sub').value=prefill.sub||'';
      document.getElementById('e-val').value=prefill.val||prefill.value||'';
      document.getElementById('e-unit').value=prefill.unit||'';
      document.getElementById('e-memo').value=prefill.memo||'';
      document.getElementById('modal-equipment-title').textContent='装備記録を編集';
      document.getElementById('modal-equipment-btn').textContent='更新する';
    } else {
      // For equipment, prefer an equipment-enabled project
      fEPrj = (hProjF!=='all'&&(proj(hProjF)||{}).enableEquipment) ? hProjF
             : (db.projects.find(p=>p.enableEquipment)||db.projects[0]||{}).id||dp;
      fEMbr='m1';
      document.getElementById('e-date').value=today();
      ['e-item','e-sub','e-memo'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('e-val').value='';
      document.getElementById('e-unit').value=fEPrj==='p_tennis'?'lbs':'';
      document.getElementById('modal-equipment-title').textContent='装備記録を追加';
      document.getElementById('modal-equipment-btn').textContent='保存する';
    }
    renderProjSel('e-proj-sel',fEPrj,'setEPrj'); renderMembSel('e-member-sel',fEMbr,'setEMbr');
    renderEquipSugs();

  } else if(type==='goal'){
    if(prefill){
      fGPrj=prefill.projectId||dp; fGMbr=prefill.memberId||'m1';
      document.getElementById('g-cat').value=prefill.cat||''; document.getElementById('g-text').value=prefill.text||'';
      document.getElementById('modal-goal-title').textContent='目標を編集';
      document.getElementById('modal-goal-btn').textContent='更新する';
    } else {
      fGPrj=dp; fGMbr='m1';
      document.getElementById('g-cat').value=''; document.getElementById('g-text').value='';
      document.getElementById('modal-goal-title').textContent='目標を追加';
      document.getElementById('modal-goal-btn').textContent='追加する';
    }
    renderProjSel('g-proj-sel',fGPrj,'setGPrj'); renderMembSel('g-member-sel',fGMbr,'setGMbr');

  } else if(type==='project'){
    if(prefill){
      editProjId=prefill.id;
      document.getElementById('proj-name').value=prefill.name||'';
      fPjEmoji=prefill.emoji||'🎯'; fPjColor=prefill.color||PROJ_COLORS[0];
      document.getElementById('proj-equip').checked=!!prefill.enableEquipment;
      document.getElementById('modal-project-title').textContent='プロジェクトを編集';
      document.getElementById('modal-project-btn').textContent='更新する';
    } else {
      editProjId=null;
      document.getElementById('proj-name').value='';
      fPjEmoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
      fPjColor=PROJ_COLORS[db.projects.length%PROJ_COLORS.length];
      document.getElementById('proj-equip').checked=false;
      document.getElementById('modal-project-title').textContent='プロジェクトを追加';
      document.getElementById('modal-project-btn').textContent='追加する';
    }
    renderEmojiGrid(); renderColorSwatches();
  }
  document.getElementById('modal-'+type).classList.add('open');
}

function closeModal(type){
  document.getElementById('modal-'+type).classList.remove('open');
  editMode=false; editId=null;
}

// ════════════════════════════════════════════
//  SAVE FUNCTIONS
// ════════════════════════════════════════════
function saveActivity(){
  if(!fAPrj){ toast('プロジェクトを選択してください'); return; }
  const title=document.getElementById('a-title').value.trim();
  if(!title){ toast('タイトルを入力してください'); return; }
  addYt();
  const tags=document.getElementById('a-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const date=document.getElementById('a-date').value||today();
  const memo=document.getElementById('a-memo').value.trim();
  const prev=db.activities.filter(a=>a.type==='activity'&&a.projectId===fAPrj&&a.memberId===fAMbr&&a.carryOver).sort((a,b)=>b.id-a.id)[0];
  const carryText=prev?`【${prev.title}】からの継続`:'';
  if(editMode&&editId){
    const a=db.activities.find(x=>x.id===editId);
    if(a) Object.assign(a,{projectId:fAPrj,memberId:fAMbr,date,title,tags,memo,carryOver:carryChk,ytLinks:[...ytArr]});
    toast('更新しました！');
  } else {
    db.activities.push({id:Date.now(),type:'activity',projectId:fAPrj,memberId:fAMbr,date,title,tags,memo,carryOver:carryChk,ytLinks:[...ytArr],carryText});
    toast('記録を追加しました！');
  }
  save(); closeModal('activity'); renderAll();
}

function saveEquipment(){
  if(!fEPrj){ toast('プロジェクトを選択してください'); return; }
  const item=document.getElementById('e-item').value.trim();
  if(!item){ toast('品名を入力してください'); return; }
  const date=document.getElementById('e-date').value||today();
  const sub=document.getElementById('e-sub').value.trim();
  const val=document.getElementById('e-val').value.trim();
  const unit=document.getElementById('e-unit').value.trim();
  const memo=document.getElementById('e-memo').value.trim();
  if(editMode&&editId){
    const a=db.activities.find(x=>x.id===editId);
    if(a) Object.assign(a,{projectId:fEPrj,memberId:fEMbr,date,title:item,item,sub,val,unit,memo});
    toast('更新しました！');
  } else {
    db.activities.push({id:Date.now(),type:'equipment',projectId:fEPrj,memberId:fEMbr,date,title:item,item,sub,val,unit,memo});
    toast('装備記録を追加しました！');
  }
  save(); closeModal('equipment'); renderAll();
}

function saveGoal(){
  if(!fGPrj){ toast('プロジェクトを選択してください'); return; }
  const cat=document.getElementById('g-cat').value.trim();
  const text=document.getElementById('g-text').value.trim();
  if(!cat){ toast('カテゴリを入力してください'); return; }
  if(!text){ toast('目標内容を入力してください'); return; }
  if(editMode&&editId){
    const g=db.goals.find(x=>x.id===editId);
    if(g) Object.assign(g,{projectId:fGPrj,memberId:fGMbr,cat,text});
    toast('目標を更新しました！');
  } else {
    db.goals.push({id:Date.now(),projectId:fGPrj,memberId:fGMbr,cat,text,done:false});
    toast('目標を追加しました！');
  }
  save(); closeModal('goal'); renderGoalSummary(); renderLogGoals(); renderStatsArea();
}

// ════════════════════════════════════════════
//  PROJECT MODAL UI
// ════════════════════════════════════════════
function renderEmojiGrid(){
  document.getElementById('proj-emoji-grid').innerHTML=EMOJIS.map(e=>
    `<button class="emoji-btn${e===fPjEmoji?' sel':''}" onclick="pickEmoji('${e}')">${e}</button>`).join('');
}
function pickEmoji(e){ fPjEmoji=e; renderEmojiGrid(); }
function renderColorSwatches(){
  document.getElementById('proj-colors').innerHTML=PROJ_COLORS.map(c=>
    `<button class="color-swatch${c===fPjColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></button>`).join('');
}
function pickColor(c){ fPjColor=c; renderColorSwatches(); }

function saveProject(){
  const name=document.getElementById('proj-name').value.trim();
  if(!name){ toast('プロジェクト名を入力してください'); return; }
  const enableEquipment=document.getElementById('proj-equip').checked;
  if(editProjId){
    const p=db.projects.find(x=>x.id===editProjId);
    if(p) Object.assign(p,{name,emoji:fPjEmoji,color:fPjColor,enableEquipment});
    toast('プロジェクトを更新しました！');
  } else {
    db.projects.push({id:'p_'+Date.now(),name,emoji:fPjEmoji,color:fPjColor,enableEquipment});
    toast('プロジェクトを追加しました！');
  }
  save(); closeModal('project'); renderAll(); renderSettingsProjects();
}

function editProj(id){ const p=db.projects.find(x=>x.id===id); if(!p)return; editId=id; editMode=true; openModal('project',p); }
function deleteProj(id){
  if(!confirm('このプロジェクトを削除しますか？\n関連する記録と目標もすべて削除されます。'))return;
  db.projects=db.projects.filter(p=>p.id!==id);
  db.activities=db.activities.filter(a=>a.projectId!==id);
  db.goals=db.goals.filter(g=>g.projectId!==id);
  if(hProjF===id) hProjF='all';
  if(lProjF===id) lProjF='all';
  save(); renderAll(); renderSettingsProjects(); toast('削除しました');
}

// ════════════════════════════════════════════
//  SETTINGS
// ════════════════════════════════════════════
function renderSettingsMembers(){
  document.getElementById('settings-members').innerHTML=members().map(m=>`
    <div class="mn-row">
      <div class="mn-emoji">${m.emoji}</div>
      <input class="mn-input" type="text" id="mn-${m.id}" value="${esc(m.name)}" placeholder="${esc(m.defName)}">
    </div>`).join('');
}
function saveMemberNames(){
  DEF_MEMBERS.forEach(m=>{ const el=document.getElementById('mn-'+m.id); if(el&&el.value.trim()) db.memberNames[m.id]=el.value.trim(); });
  save(); initFilters(); renderAll(); toast('メンバー名を保存しました！');
}

function renderSettingsProjects(){
  const el=document.getElementById('settings-projects'); if(!el)return;
  if(!db.projects.length){ el.innerHTML='<div class="day-empty">プロジェクトがありません</div>'; return; }
  el.innerHTML=db.projects.map(p=>`
    <div class="proj-settings-item">
      <div class="proj-settings-dot" style="background:${p.color}"></div>
      <div style="font-size:20px">${p.emoji}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--text)">${esc(p.name)}</div>${p.enableEquipment?'<div style="font-size:11px;color:var(--text3)">装備記録あり</div>':''}</div>
      <div style="display:flex;gap:6px">
        <button class="proj-action-btn" onclick="editProj('${p.id}')">編集</button>
        ${p.id==='p_tennis'?'':`<button class="proj-action-btn del" onclick="deleteProj('${p.id}')">削除</button>`}
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════
//  EXPORT / IMPORT
// ════════════════════════════════════════════
function exportData(){
  const b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`mylog_${today()}.json`; a.click();
}
function importData(){ document.getElementById('import-input').click(); }
function handleImport(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.projects&&data.activities!=null&&data.goals!=null){ db=data; save(); renderAll(); toast('インポート完了！'); }
      else if(data.practices||data.gears||data.skillGoals){ convertOld(data); }
      else{ toast('不正なファイル形式です'); }
    }catch{ toast('ファイルの読み込みに失敗しました'); }
    e.target.value='';
  };
  r.readAsText(file);
}

function importOldTennis(){
  try{
    const raw=localStorage.getItem(OLD_KEY);
    if(!raw){ toast('旧テニスアプリのデータが見つかりません'); return; }
    convertOld(JSON.parse(raw));
  }catch{ toast('変換に失敗しました'); }
}

function convertOld(old){
  if(!db.projects.find(p=>p.id==='p_tennis'))
    db.projects.unshift({id:'p_tennis',name:'テニス',emoji:'🎾',color:'#22a55e',enableEquipment:true});
  if(old.memberNames) Object.assign(db.memberNames,old.memberNames);
  (old.practices||[]).forEach(p=>{
    if(!db.activities.find(a=>a.id===p.id))
      db.activities.push({id:p.id,type:'activity',projectId:'p_tennis',memberId:p.memberId||'m1',date:p.date,title:p.title,tags:p.tags||[],memo:p.memo||'',carryOver:!!p.carryOver,ytLinks:p.ytLinks||[],carryText:''});
  });
  (old.gears||[]).forEach(g=>{
    if(!db.activities.find(a=>a.id===g.id))
      db.activities.push({id:g.id,type:'equipment',projectId:'p_tennis',memberId:g.memberId||'m1',date:g.date,title:g.gut||'',item:g.gut||'',sub:g.racket||'',val:g.tension?String(g.tension):'',unit:'lbs',memo:g.memo||''});
  });
  (old.skillGoals||[]).forEach(sg=>{
    if(!db.goals.find(x=>x.id===sg.id))
      db.goals.push({id:sg.id,projectId:'p_tennis',memberId:sg.memberId||'m1',cat:sg.cat||'',text:sg.text||'',done:false});
  });
  save(); renderAll(); toast('旧テニスアプリのデータを引き継ぎました！');
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(20px)'; },2500);
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function init(){
  load(); initCal(); initFilters();
  renderHome(); renderCalendar(); renderGoalSummary();
  renderSettingsMembers(); updateFabEquip();

  // Close modals on backdrop click
  ['activity','equipment','goal','project'].forEach(t=>{
    document.getElementById('modal-'+t).addEventListener('click',e=>{
      if(e.target.classList.contains('modal-overlay')) closeModal(t);
    });
  });

  // Close FAB on outside click
  document.getElementById('app').addEventListener('click',e=>{
    if(fabOpen&&!e.target.closest('.fab')) closeFab();
  });

  // YT input: add on Enter
  document.getElementById('a-yt').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();addYt();} });
}

init();
</script>
